name: Serv00 HTTPS health check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-urls:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check configured HTTPS endpoints
        env:
          HEALTH_ENDPOINTS: ${{ secrets.http }}
        run: |
          set -euo pipefail
          IFS=$',， ' read -r -a endpoints <<< "$HEALTH_ENDPOINTS"
          failures=0
          for url in "${endpoints[@]}"; do
            [ -n "$url" ] || continue
            case "$url" in
              https://*) ;;
              *) echo '拒绝非 HTTPS 的保活地址'; failures=$((failures + 1)); continue ;;
            esac
            if response=$(curl --fail --silent --show-error --location \
              --proto '=https' --connect-timeout 10 --max-time 30 "$url"); then
              if [[ "$response" == *"网页保活启动"* || "$response" == *"主程序重启成功"* ]]; then
                echo '端点运行正常（地址已隐藏）'
              else
                echo '端点返回了非预期内容（地址已隐藏）'
                failures=$((failures + 1))
              fi
            else
              echo '端点连接失败（地址已隐藏）'
              failures=$((failures + 1))
            fi
          done
          test "$failures" -eq 0
