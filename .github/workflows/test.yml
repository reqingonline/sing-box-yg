name: Security and shell checks

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install declared test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Run release preflight
        run: bash scripts/release-checks.sh

  distro-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - alpine:3.20
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout runtime dependencies
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache bash git jq coreutils
          else
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq bash git jq coreutils
          fi
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run lifecycle smoke test
        run: bash tests/integration/install-smoke.sh
