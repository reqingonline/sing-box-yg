name: Keep Serv00 servers alive

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-servers-alive:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout verified automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install declared dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass jq
      - name: Process encrypted Serv00 account list
        env:
          ACCOUNTS: ${{ secrets.SERV00_ACCOUNTS }}
        run: |
          set -euo pipefail
          test -n "$ACCOUNTS"
          bash kp.sh
