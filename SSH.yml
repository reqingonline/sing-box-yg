name: Keep Serv00 SSH accounts alive

on:
  schedule:
    - cron: '0 15 */8 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-servers-alive:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ACCOUNTS_JSON: ${{ secrets.SERV00_ACCOUNTS }}
      KNOWN_HOSTS: ${{ secrets.SERV00_KNOWN_HOSTS }}
    steps:
      - name: Checkout verified automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install declared dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq openssh-client sshpass
      - name: Verify host keys and connect
        run: |
          set -euo pipefail
          test -n "$ACCOUNTS_JSON"
          test -n "$KNOWN_HOSTS"
          jq -e 'type == "array" and length > 0' <<<"$ACCOUNTS_JSON" >/dev/null
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          failures=0
          count=0
          while IFS= read -r account; do
            count=$((count + 1))
            SSH_USER=$(jq -er '.SSH_USER | strings' <<<"$account")
            SSH_PASS=$(jq -er '.SSH_PASS | strings' <<<"$account")
            HOST=$(jq -er '.HOST | strings' <<<"$account")
            case "$SSH_USER" in ''|*[!A-Za-z0-9._-]*) echo "第 $count 个账号名格式无效"; failures=$((failures + 1)); continue ;; esac
            case "$HOST" in ''|*[!A-Za-z0-9.-]*) echo "第 $count 个主机名格式无效"; failures=$((failures + 1)); continue ;; esac
            if sshpass -d 3 ssh \
              -o BatchMode=no \
              -o ConnectTimeout=15 \
              -o ConnectionAttempts=1 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              "$SSH_USER@$HOST" true 3<<<"$SSH_PASS"; then
              echo "第 $count 台服务器连接成功（地址和账号已隐藏）"
            else
              echo "第 $count 台服务器连接失败（地址和账号已隐藏）"
              failures=$((failures + 1))
            fi
            unset SSH_USER SSH_PASS HOST
            sleep 2
          done < <(jq -c '.[]' <<<"$ACCOUNTS_JSON")
          test "$failures" -eq 0
